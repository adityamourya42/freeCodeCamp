<!DOCTYPE html>
<html>
    <head>
        <title>Linear Gradient</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="linear-gradient.css">
    </head>
    <body>
        <h1>Linear Gradient</h1>
        <p>Linear gradient creates a gradual blend between colors along a straight line. You can control the direction of this line and the colors used.</p>
        <div class="linear-gradient"></div>
        <p>You can use other directions like <strong>to left</strong>, <strong> to top</strong>, <strong>to bottom</strong></p>
        <p>You can also use multiple color stops in a linear gradient.</p>
        <div class="multi-color-gradient"></div>
    </body>
</html>
