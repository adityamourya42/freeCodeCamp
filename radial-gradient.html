        <title>Radial Gradient</title>
        <meta charset="UTF-8">

    <body>
        <h1>Radial Gradient</h1>
        <p>Radial gradients, on the other hand, create a circular or elliptical gradient that radiates from a central point.</p>
        <div class="radial-gradient"></div>
        <p>You can also specify the shape and size of radial gradient.</p>
        <div class="custom-radial-gradient"></div>
        <p>Both linear and radial gradients allow you to specify color stops at precise positions.</p>
        <div class="precise-gradient"></div>
    </body>
